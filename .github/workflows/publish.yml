name: Publish to pub.dev

# pub.dev only accepts automated publishing when the workflow is triggered by
# pushing a git tag that matches the tag pattern configured on pub.dev
# (Admin > Automated publishing, e.g. `v{{version}}`). Do NOT trigger this from
# schedule/workflow_dispatch — pub.dev rejects publishing without a tag.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  publish:
    permissions:
      id-token: write # required for OIDC authentication with pub.dev
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
