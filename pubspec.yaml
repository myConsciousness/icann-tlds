name: icann_tlds
description: >-
  Automatically updated list of all official Top-Level Domains (TLDs) from ICANN.
  Includes domain validation, email validation, and utility functions for TLD filtering.
  Zero dependencies, daily auto-updates, supports internationalized domains (IDNs).
version: 1.2.1
repository: https://github.com/myConsciousness/icann-tlds
issue_tracker: https://github.com/myConsciousness/icann-tlds/issues
homepage: https://github.com/myConsciousness/icann-tlds
documentation: https://pub.dev/documentation/icann_tlds/latest/

environment:
  sdk: ^3.0.0

topics:
  - tld
  - tlds
  - domain
  - icann

dev_dependencies:
  lints: ^2.0.0
  test: ^1.21.0
  punycode: ^1.0.0
  http: ^1.1.0
  import_sorter: ^4.6.0
